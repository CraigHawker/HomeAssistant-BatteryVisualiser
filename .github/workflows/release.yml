name: Release

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: Optional release suffix (for example beta). When set, a prerelease is created.
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.calver.outputs.tag_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute CalVer tag
        id: calver
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const timeZone = 'Europe/London';
            const formatter = new Intl.DateTimeFormat('en-CA', {
              timeZone,
              year: 'numeric',
              month: '2-digit',
              day: '2-digit'
            });
            const [{ value: year }, , { value: month }, , { value: day }] = formatter.formatToParts(new Date());
            const baseCalVer = `${year}.${month}.${day}`;

            const defaultBranch = context.payload.repository?.default_branch || 'master';
            const branchName = context.ref?.startsWith('refs/heads/')
              ? context.ref.substring('refs/heads/'.length)
              : context.ref;
            const isDefaultBranch = branchName === defaultBranch;

            const normalizeSuffix = (value) => value
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .replace(/-{2,}/g, '-');

            const requestedSuffixRaw = core.getInput('suffix') || '';
            const requestedSuffix = normalizeSuffix(requestedSuffixRaw);
            const branchSuffix = normalizeSuffix(branchName || 'preview');

            const effectiveSuffix = requestedSuffix
              ? requestedSuffix
              : (isDefaultBranch ? '' : branchSuffix || 'preview');

            if (isDefaultBranch && !effectiveSuffix) {
              const { data: permissionData } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor
              });

              if (permissionData.permission !== 'admin') {
                core.setFailed(
                  `Stable releases on ${defaultBranch} require admin permission. ` +
                  `Actor '${context.actor}' has '${permissionData.permission}'. ` +
                  `Use a suffix input (for example 'beta') to publish a prerelease.`
                );
                return;
              }
            }

            const baseTag = effectiveSuffix
              ? `v${baseCalVer}-${effectiveSuffix}`
              : `v${baseCalVer}`;

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = new RegExp(`^${escapeRegex(baseTag)}(?:\\.(\\d+))?$`);
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let highestSuffix = -1;
            for (const tag of tags) {
              const match = pattern.exec(tag.name);
              if (!match) {
                continue;
              }

              const suffix = match[1] ? Number.parseInt(match[1], 10) : 0;
              if (suffix > highestSuffix) {
                highestSuffix = suffix;
              }
            }

            const tagName = highestSuffix < 0 ? baseTag : `${baseTag}.${highestSuffix + 1}`;
            const isPrerelease = effectiveSuffix.length > 0;
            core.setOutput('tag_name', tagName);
            core.setOutput('base_tag', baseTag);
            core.setOutput('suffix', effectiveSuffix);
            core.setOutput('is_prerelease', String(isPrerelease));
            core.setOutput('time_zone', timeZone);
            core.info(`Selected release tag ${tagName}`);
            core.info(`Branch=${branchName}; defaultBranch=${defaultBranch}; prerelease=${isPrerelease}`);

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage tests
        run: npm run test:coverage

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: npm run test:e2e

      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test-results artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build assets
        run: npm run build:release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.tag_name }}
          name: ${{ steps.calver.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.calver.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/**

  validate-hacs-release:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin

  cleanup-failed-release:
    runs-on: ubuntu-latest
    needs:
      - build-and-release
      - validate-hacs-release
    if: ${{ always() && needs.build-and-release.result == 'success' && needs.validate-hacs-release.result == 'failure' }}
    steps:
      - name: Delete release and tag after failed validation
        uses: actions/github-script@v8
        with:
          script: |
            const tag = `${{ needs.build-and-release.outputs.tag_name }}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id
              });
              core.info(`Deleted release for tag ${tag}`);
            } catch (error) {
              core.warning(`Release for tag ${tag} not found or already deleted: ${error.message}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`
              });
              core.info(`Deleted tag ${tag}`);
            } catch (error) {
              core.warning(`Tag ${tag} not found or already deleted: ${error.message}`);
            }

            core.setFailed(`HACS validation failed. Removed release and tag ${tag}.`);
